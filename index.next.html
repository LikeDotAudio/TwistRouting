<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TwistRouting — A.8 side build</title>
  <!-- SHARED LCARS stylesheet (same file the live index.htm loads — never forked).
       Fully controls console styling; no per-entry chrome (the list-view skeleton is retired). -->
  <link rel="stylesheet" href="./lcars.css" />
  <script>
    // Cutover hygiene: the retired JS app registered a cache-first service worker
    // (twist-v*) that would otherwise keep serving the old shell at this URL. Once
    // this TS build loads, evict every service worker + cache so the network wins.
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then((rs) => rs.forEach((r) => r.unregister()));
    }
    if (window.caches) caches.keys().then((ks) => ks.forEach((k) => caches.delete(k)));
  </script>
</head>
<body>
  <div id="app">loading…</div>
  <script type="module" src="/src/app/main.ts"></script>
</body>
</html>
