
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Anthony's Media Workflow Matrix</title>
    <link rel="stylesheet" href="lcars.css">
</head>
<body>

    <div class="container">
        <!-- SOURCES super-pools are built dynamically by reading Sources/ — see js/sources.js -->
        <div class="panel ingress-panel">
        </div>

        <div class="sidebar-sash" id="sidebar-sash" title="Drag to resize the sources sidebar"></div>

        <div class="panel dest-frame" style="overflow: hidden; display: flex; flex-direction: column; border: none; border-radius: 0;">
            <div id="production-content" style="flex: 1 1 auto; min-height: 0; overflow-y: auto; padding: 24px 6px 4px 0;">
                <!-- Tab contents injected here -->
            </div>
        </div>
    </div>

    <footer class="app-footer">
        <div id="production-tabs" class="tabs-header">
            <!-- Tabs injected here -->
        </div>
    </footer>

    <div id="twist-modal" class="modal-overlay">
        <div class="modal-content">
            <span class="modal-close" onclick="closeTwistModal()">&times;</span>
            <h2 id="modal-title" class="modal-title">TWIST DETAILS</h2>
            <div id="matrix-container" class="matrix-container">
                <!-- Matrix rows injected here -->
            </div>
            <div style="margin-top: 15px; text-align: center; color: rgba(255,255,255,0.5); font-size: 12px; letter-spacing: 1px;">
                DRAG ROWS TO REORDER PRIORITY AND SWITCHER INPUT ASSIGNMENTS
            </div>
        </div>
    </div>

    <a class="credit-button" href="https://like.audio/20260627/twist-like-audio/" target="_blank" rel="noopener">CREATED BY ANTHONY PETER KUZUB&nbsp;&nbsp;-&nbsp;&nbsp;WWW.LIKE.AUDIO</a>

    <script type="module" src="js/main.js?v=108"></script>
    <script>
        // Offline cache: after the first load the app serves from the local
        // machine and stops hitting the website. See sw.js.
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').catch(e => console.warn('SW registration failed', e));
            });
        }
    </script>
</body>
</html>
