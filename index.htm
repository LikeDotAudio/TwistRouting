
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Anthony's Media Workflow Matrix</title>
    <style>
        :root {
            --bg-color: #050a15;
            --panel-bg: rgba(10, 20, 40, 0.8);
            --cyan: #00ffff;
            --magenta: #ff00ff;
            --blue: #4d94ff;
            --text-main: #e0f0ff;
            /* Signal category colours */
            --video-color: #CC99CC;   /* violet */
            --audio-color: #FF9C63;   /* orange */
            --program-color: #646DCC; /* blue */
            --glow-cyan: 0 0 10px var(--cyan), 0 0 20px rgba(0, 255, 255, 0.4);
            --glow-magenta: 0 0 10px var(--magenta), 0 0 20px rgba(255, 0, 255, 0.4);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background-image: radial-gradient(circle at 50% 50%, #1a2a4c 0%, #050a15 80%);
        }

        .container {
            display: grid;
            grid-template-columns: var(--sidebar-width, 250px) 6px 1fr;
            gap: 8px;
            flex: 1;
            padding: 20px;
            min-height: 0;
        }

        /* Draggable divider ("sash") to resize the sources sidebar. */
        .sidebar-sash {
            align-self: stretch;
            cursor: col-resize;
            background: rgba(255, 255, 255, 0.07);
            border-radius: 4px;
            transition: background 0.15s;
        }
        .sidebar-sash:hover,
        .sidebar-sash.dragging {
            background: var(--cyan, #3FC1C9);
            box-shadow: 0 0 8px rgba(63, 193, 201, 0.6);
        }

        /* Tab strip pinned to the bottom of the viewport as a footer */
        .app-footer {
            position: relative;
            flex: 0 0 auto;
            background: var(--panel-bg);
            padding: 20px 16px 6px;
            overflow-x: auto;
        }
        /* LCARS accent rail above the tabs: rises on the left, sweeps right */
        .app-footer::before {
            content: '';
            position: absolute;
            top: 4px;
            left: 16px;
            right: 16px;
            height: 10px;
            background: var(--program-color, #646DCC);
            border-radius: 12px 12px 0 0;
        }

        .panel {
            flex: 1;
            background-color: var(--panel-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 20px;
            overflow-y: auto;
            overflow-x: hidden; /* Prevent horizontal scrollbars */
        }

        /* Ingress panel floats: no box, no header, tight padding */
        .ingress-panel {
            background: transparent;
            border: none;
            border-radius: 0;
            padding: 0;
        }

        .productions-super-pool {
            --lcars-color: #646DCC; /* Program Blue */
        }
        .signal-node.prod-source {
            border-color: #646DCC;
            color: #646DCC;
            box-shadow: 0 0 5px rgba(100, 109, 204, 0.4);
        }

        /* LCARS right spine: a vertical bar down the right edge that connects
           up into the production title rail to form a top+right frame. */
        .program-row::after {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            bottom: 0;
            width: 45px;
            background: var(--prod-color, #ffaa00);
            border-radius: 0 0 30px 30px; /* rounded foot at the bottom */
            z-index: 0;
            pointer-events: none;
        }
        /* Keep the production's contents above the spine */
        .program-row > * {
            position: relative;
            z-index: 1;
        }

        /* LCARS top rail holding the production name: spans the full width and
           butts flush into the right spine, rounded on the LEFT (mirrored). */
        .program-title {
            display: block;
            width: 100%;
            color: #000;
            font-weight: bold;
            font-size: 16px;
            letter-spacing: 2px;
            padding: 8px 26px;
            margin-bottom: 14px;
            background: var(--prod-color, #ffaa00);
            border-radius: 14px 0 0 14px; /* rounded left end, square right to meet the spine */
        }

        /* Credit pill pinned to the bottom-right corner. */
        .credit-button {
            position: fixed;
            bottom: 10px;
            right: 14px;
            z-index: 1000;
            display: inline-block;
            background: var(--program-color, #646DCC);
            color: #000;
            font-size: 10px;
            font-weight: bold;
            letter-spacing: 1px;
            text-decoration: none;
            padding: 6px 16px;
            border-radius: 14px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.45);
            opacity: 0.82;
            transition: opacity 0.2s, box-shadow 0.2s;
            white-space: nowrap;
        }
        .credit-button:hover {
            opacity: 1;
            box-shadow: 0 0 16px rgba(100, 109, 204, 0.75);
        }

        .panel-title {
            color: var(--cyan);
            font-size: 14px;
            margin-bottom: 15px;
            border-bottom: 1px solid rgba(0, 255, 255, 0.3);
            padding-bottom: 5px;
            letter-spacing: 2px;
        }

        /* Input Styles */
        .input-group {
            margin-bottom: 0;
        }

        .input-grid-video {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        .input-grid-audio {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 5px;
        }

        .signal-node {
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid var(--blue);
            border-radius: 4px;
            padding: 8px 5px;
            text-align: center;
            font-size: 10px;
            color: var(--text-main);
            position: relative;
            overflow: hidden;
            cursor: grab;
        }

        .signal-node:active {
            cursor: grabbing;
        }

        /* Shape tells category at a glance: video reads as a trapezoid (\ /),
           audio as a rounded pill ( ). Multiplex/group containers stay square. */
        .signal-node.video:not(.multiplex):not(.dropped-group) {
            clip-path: polygon(0 0, 100% 0, 90% 100%, 10% 100%);
            border-radius: 0;
            border-color: transparent; /* real border is clipped on the slants */
            padding-left: 12px;
            padding-right: 12px;
            /* clip-path clips the border, so trace the trapezoid silhouette with a
               1px drop-shadow outline (currentColor = the node's source colour) plus
               a soft glow — both follow the clipped shape, giving defined edges. */
            filter:
                drop-shadow(1px 0 0)
                drop-shadow(-1px 0 0)
                drop-shadow(0 1px 0)
                drop-shadow(0 -1px 0)
                drop-shadow(0 0 4px);
        }
        .signal-node.audio:not(.multiplex):not(.dropped-group) {
            border-radius: 999px;
            padding-left: 14px;
            padding-right: 14px;
        }

        .signal-node::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 50%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            animation: scanline 3s infinite linear;
        }

        .multiplex-children {
            display: flex;
            flex-direction: column;
            gap: 5px;
            margin-top: 5px;
            padding-top: 5px;
            border-top: 1px dashed rgba(255,255,255,0.2);
        }
        .multiplex-header {
            pointer-events: none;
        }

        /* ISO recorder RECORD / STOP control */
        .record-controls {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 8px;
        }
        .record-btn {
            background: #ff3344;
            color: #fff;
            border: none;
            border-radius: 4px;
            padding: 4px 14px;
            font-weight: 900;
            font-size: 10px;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            font-family: Arial, Helvetica, sans-serif;
        }
        .record-btn:hover {
            filter: brightness(1.15);
        }
        .record-btn.recording {
            background: #000;
            border: 1px solid #ff3344;
            color: #ff3344;
        }
        .recording-indicator {
            display: none;
            color: #ff3344;
            font-weight: 900;
            font-size: 10px;
            letter-spacing: 1px;
            animation: recPulse 1s steps(1) infinite;
        }
        @keyframes recPulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.25; } }

        /* A dropped video+audio group: one compact chip in the group's colour,
           with the individual feeds tucked inside (click to expand). */
        .dropped-group {
            cursor: pointer;
            border-width: 2px;
            font-weight: bold;
        }
        .dropped-group-header {
            pointer-events: none;
            white-space: nowrap;
        }
        .dropped-group-children {
            display: flex;
            flex-direction: column;
            gap: 4px;
            margin-top: 5px;
            padding-top: 5px;
            border-top: 1px dashed rgba(255,255,255,0.25);
        }

        .signal-node.video {
            border-color: var(--video-color);
            color: var(--video-color);
            box-shadow: 0 0 5px rgba(204, 153, 204, 0.4);
        }
        .signal-node.audio {
            border-color: var(--audio-color);
            color: var(--audio-color);
            box-shadow: 0 0 5px rgba(255, 156, 99, 0.4);
            font-size: 9px;
            padding: 5px 2px;
        }
        
        .signal-node.video-main { border-color: #ff00ff; color: #ff00ff; box-shadow: 0 0 5px rgba(255,0,255,0.3); }
        .signal-node.video-aux { border-color: #ffaa00; color: #ffaa00; box-shadow: 0 0 5px rgba(255,170,0,0.3); }
        .signal-node.video-remote { border-color: #ff3366; color: #ff3366; box-shadow: 0 0 5px rgba(255,51,102,0.3); }
        
        .signal-node.audio-studio { border-color: #00ffff; color: #00ffff; box-shadow: 0 0 5px rgba(0,255,255,0.3); }
        .signal-node.audio-external { border-color: #aaff00; color: #aaff00; box-shadow: 0 0 5px rgba(170,255,0,0.3); }
        .signal-node.audio-comms { border-color: #aa00ff; color: #aa00ff; box-shadow: 0 0 5px rgba(170,0,255,0.3); }

        /* Pipeline / Twists Styles */
        .pipeline {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 30px;
            height: 100%;
            position: relative;
        }

        .twist-container {
            width: 45%;
            min-height: 0; /* Stays compact until sources are patched in */
            padding: 24px 10px 6px 55px; /* Leave room for LCARS borders */
            background: transparent;
            border: none;
            border-radius: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            position: relative;
            transition: all 0.3s ease;
        }

        .twist-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100px;
            height: 100%;
            border-left: 45px solid var(--lcars-color, #ffaa00);
            border-top: 20px solid var(--lcars-color, #ffaa00);
            border-top-left-radius: 25px;
            border-bottom-left-radius: 25px;
            box-sizing: border-box;
            z-index: 0;
        }

        .twist-container::after {
            content: '';
            position: absolute;
            top: 0;
            left: 110px;
            right: 0;
            height: 20px;
            background-color: var(--lcars-color, #ffaa00);
            border-top-right-radius: 10px;
            border-bottom-right-radius: 10px;
            z-index: 0;
        }

        .twist-container:hover {
            opacity: 0.9;
        }

        /* A row of 3 small monitors, each ~1/3 of a full twist's width */
        .monitor-row {
            display: flex;
            gap: 10px;
            width: 100%;
            flex-wrap: nowrap;
        }
        .twist-container.monitor-twist {
            padding: 18px 6px 6px 34px; /* smaller left bar */
        }
        .twist-container.monitor-twist::before {
            border-left-width: 26px;
            border-top-width: 14px;
            border-top-left-radius: 16px;
            border-bottom-left-radius: 16px;
        }
        .twist-container.monitor-twist::after {
            left: 64px;
            height: 14px;
        }
        .twist-container.monitor-twist .twist-title {
            left: 70px;
            top: 1px;
            font-size: 10px;
            letter-spacing: 1px;
        }
        .twist-container.monitor-twist .twist-stats {
            top: 2px;
            font-size: 8px;
        }
        /* The matrix-container is the plain black landing box when empty */
        .twist-container .matrix-container {
            width: 100%;
            min-height: 70px;
        }
        .twist-container.monitor-twist .matrix-container {
            min-height: 45px;
        }

        .twist-title {
            position: absolute;
            top: 3px;
            left: 120px;            /* left end of the top rail, beside the gap */
            font-size: 13px;
            font-weight: bold;
            color: #000 !important;
            letter-spacing: 2px;
            text-transform: uppercase;
            z-index: 2;
        }

        /* Source summary sits on the right end of the LCARS top rail */
        .twist-stats {
            position: absolute;
            top: 5px;
            right: 40px;            /* clear of the fold lip */
            font-size: 10px;
            font-weight: bold;
            color: #000;
            letter-spacing: 1px;
            z-index: 2;
        }

        /* Clickable right "lip" of the top rail: folds/unfolds the DNA strand */
        .twist-lip {
            position: absolute;
            top: 0;
            right: 0;
            width: 28px;
            height: 20px;           /* matches the top rail height */
            z-index: 3;
            cursor: pointer;
            border-top-right-radius: 10px;
            border-bottom-right-radius: 10px;
        }
        .twist-lip::after {
            content: '▾';
            position: absolute;
            top: 3px;
            right: 8px;
            font-size: 11px;
            color: #000;
            transition: transform 0.2s;
        }
        .twist-container.helix-folded .twist-lip::after {
            transform: rotate(180deg);
        }
        .twist-lip:hover {
            background: rgba(0, 0, 0, 0.18);
        }
        .twist-container.monitor-twist .twist-lip {
            height: 14px;
            width: 20px;
        }
        .twist-container.monitor-twist .twist-lip::after {
            top: 1px;
            font-size: 9px;
        }
        /* The whole left LCARS bar also folds/unfolds the strand when clicked */
        .twist-foldbar {
            position: absolute;
            left: 0;
            top: 0;
            width: 45px;
            height: 100%;
            z-index: 2;
            cursor: pointer;
        }
        .twist-container.monitor-twist .twist-foldbar {
            width: 26px;
        }

        /* SVG Helix Animation */
        svg {
            width: 100%;
            height: 100px;
        }

        .strand {
            fill: none;
            stroke-width: 3;
            stroke-linecap: round;
        }

        .strand-1 {
            stroke: var(--cyan);
            stroke-dasharray: 10 5;
            animation: flow 20s linear infinite;
        }

        .strand-2 {
            stroke: var(--magenta);
            stroke-dasharray: 10 5;
            animation: flow 20s linear infinite reverse;
        }

        .connector-line {
            stroke: rgba(255, 255, 255, 0.2);
            stroke-width: 1;
        }

        @keyframes scanline {
            0% { left: -100%; }
            100% { left: 200%; }
        }

        @keyframes flow {
            to { stroke-dashoffset: -1000; }
        }

        /* Arrows connecting twists */
        .arrow {
            color: rgba(0, 255, 255, 0.5);
            font-size: 24px;
            position: absolute;
        }

        /* Modal Styles */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 10, 0.85);
            backdrop-filter: blur(8px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: var(--panel-bg);
            border: none;
            border-radius: 0;
            width: 80%;
            max-width: 800px;
            min-height: 500px;
            max-height: 80vh;
            padding: 50px 20px 20px 90px;
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }

        .modal-content::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 150px;
            height: 100%;
            border-left: 70px solid var(--lcars-color, #ffaa00);
            border-top: 30px solid var(--lcars-color, #ffaa00);
            border-top-left-radius: 50px;
            border-bottom-left-radius: 50px;
            box-sizing: border-box;
            z-index: 0;
        }

        .modal-content::after {
            content: '';
            position: absolute;
            top: 0;
            left: 160px;
            right: 0;
            height: 30px;
            background-color: var(--lcars-color, #ffaa00);
            border-top-right-radius: 15px;
            border-bottom-right-radius: 15px;
            z-index: 0;
        }

        .modal-close {
            position: absolute;
            top: 0; 
            right: 15px;
            color: #000;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            z-index: 3;
            line-height: 30px;
        }

        .modal-close:hover {
            text-shadow: var(--glow-magenta);
            transform: scale(1.1);
        }

        .modal-title {
            position: absolute;
            top: 7px;
            right: 50px; /* Leave space for the close button */
            margin: 0;
            font-size: 16px;
            font-weight: bold;
            color: #000 !important;
            letter-spacing: 3px;
            z-index: 2;
            text-shadow: none;
        }

        .matrix-container {
            flex: 1;
            overflow-y: auto;
            background: rgba(0, 0, 0, 0.5);
            border: 1px inset rgba(0, 255, 255, 0.2);
            border-radius: 8px;
            padding: 20px;
        }

        .matrix-row {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
            background: rgba(0, 20, 40, 0.6);
            border: 1px solid rgba(0, 255, 255, 0.2);
            border-radius: 6px;
            padding: 10px;
            cursor: grab;
            transition: all 0.2s ease;
        }

        .matrix-row.dragging {
            opacity: 0.4;
            background: rgba(0, 255, 255, 0.1);
            border-color: var(--cyan);
        }

        .switcher-input {
            width: 120px;
            color: var(--magenta);
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 2px;
            text-shadow: var(--glow-magenta);
            text-align: right;
        }

        .twist-svg {
            flex: 1;
            height: 30px;
            margin: 0 20px;
        }

        .swimmer-slot {
            width: 100px;
            display: flex;
            justify-content: center;
        }
        .signal-node.selected {
            box-shadow: 0 0 10px #fff, inset 0 0 10px rgba(255, 255, 255, 0.5);
            border-color: #fff;
            transform: scale(1.05);
            z-index: 10;
        }

        .remove-btn {
            color: rgba(255, 255, 255, 0.3);
            font-size: 20px;
            cursor: pointer;
            margin-left: 15px;
            transition: 0.2s;
        }
        .remove-btn:hover {
            color: #ff3333;
            text-shadow: 0 0 10px #ff3333;
        }
        
        .switcher-input.audio-input {
            color: var(--audio-color);
            text-shadow: 0 0 10px var(--audio-color);
        }
        .switcher-input.video-input {
            color: var(--video-color);
            text-shadow: 0 0 10px var(--video-color);
        }
        .signal-node.video-main { border-color: #CC99CC; box-shadow: 0 0 5px rgba(204,153,204,0.4); color: #CC99CC; }
        .signal-node.video-aux { border-color: #D9B3D9; box-shadow: 0 0 5px rgba(217,179,217,0.4); color: #D9B3D9; }
        .signal-node.video-remote { border-color: #B266B2; box-shadow: 0 0 5px rgba(178,102,178,0.4); color: #B266B2; }
        .signal-node.video-st1 { border-color: #CC99CC; box-shadow: 0 0 5px rgba(204,153,204,0.4); color: #CC99CC; }
        .signal-node.video-st2 { border-color: #D9B3D9; box-shadow: 0 0 5px rgba(217,179,217,0.4); color: #D9B3D9; }
        .signal-node.video-st3 { border-color: #E0CCE0; box-shadow: 0 0 5px rgba(224,204,224,0.4); color: #E0CCE0; }
        .signal-node.video-st4 { border-color: #B266B2; box-shadow: 0 0 5px rgba(178,102,178,0.4); color: #B266B2; }
        .signal-node.audio-studio { border-color: #FF9C63; box-shadow: 0 0 5px rgba(255,156,99,0.4); color: #FF9C63; }
        .signal-node.audio-external { border-color: #ED864C; box-shadow: 0 0 5px rgba(237,134,76,0.4); color: #ED864C; }
        .signal-node.audio-comms { border-color: #F5AD00; box-shadow: 0 0 5px rgba(245,173,0,0.4); color: #F5AD00; }
        
        /* ===== Fault / status states ===== */
        @keyframes faultPulse {
            0%, 100% { box-shadow: 0 0 4px rgba(255, 45, 45, 0.55); border-color: #ff3b3b; }
            50%      { box-shadow: 0 0 18px rgba(255, 45, 45, 0.95); border-color: #ff8a8a; }
        }
        .signal-node.fault {
            border-color: #ff3b3b !important;
            color: #ff6b6b !important;
            animation: faultPulse 1.1s ease-in-out infinite !important;
        }
        .foldable-header.fault {
            animation: faultPulse 1.1s ease-in-out infinite;
            outline: 2px solid #ff3b3b;
            outline-offset: -2px;
        }
        .fault-tag {
            font-size: 9px;
            color: #2a0000;
            background: #ff3b3b;
            border-radius: 3px;
            padding: 1px 5px;
            margin-left: 8px;
            letter-spacing: 1px;
            font-weight: bold;
        }
        /* A faulted (offline) destination room pulses its whole L-bar red.
           Uses an animation (no !important) so it overrides the inline/normal
           background — an !important static colour would beat the animation. */
        @keyframes lbarPulse {
            0%, 100% { background-color: #ff3b3b; box-shadow: 0 0 8px rgba(255, 45, 45, 0.55); }
            50%      { background-color: #8f1414; box-shadow: 0 0 26px rgba(255, 45, 45, 0.95); }
        }
        .program-row.fault .program-title {
            color: #2a0000;
            animation: lbarPulse 1.1s ease-in-out infinite;
        }
        .program-row.fault::after {
            animation: lbarPulse 1.1s ease-in-out infinite;
        }
        .program-row.fault .twist-container { animation: faultPulse 1.2s ease-in-out infinite; }
        /* Corrupted DNA strand: a faulted source has been routed into this twist. */
        .twist-container.corrupted .twist-title { color: #ff3b3b; }
        .twist-container.corrupted svg { animation: faultPulse 0.5s steps(2, end) infinite; }

        .super-pool-container {
            position: relative;
            background: transparent;
            border: none;
            border-radius: 0;
            padding: 27px 2px 2px 62px; /* Very tight padding: 2px gap from 60px spine */
            margin-bottom: 25px;
            box-shadow: none;
            cursor: pointer; /* Suggests the spine is clickable */
        }
        
        .super-pool-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 130px;
            height: 100%;
            border-left: 60px solid var(--lcars-color, #ffaa00);
            border-top: 25px solid var(--lcars-color, #ffaa00);
            border-top-left-radius: 40px;
            border-bottom-left-radius: 40px;
            box-sizing: border-box;
            z-index: 0;
        }

        .super-pool-container::after {
            content: '';
            position: absolute;
            top: 0;
            left: 140px;
            right: 0;
            height: 25px;
            background-color: var(--lcars-color, #ffaa00);
            border-top-right-radius: 12px;
            border-bottom-right-radius: 12px;
            z-index: 0;
        }

        .super-pool-content {
            position: relative;
            z-index: 1;
            cursor: default; /* Reset cursor for content inside */
        }

        .video-super-pool {
            --lcars-color: #CC99CC; /* Violet */
        }
        .audio-super-pool {
            --lcars-color: #FF9C63; /* Orange */
        }
        
        .super-pool-title {
            position: absolute;
            top: 6px;
            right: 15px;
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 3px;
            color: #000;
            z-index: 2;
            cursor: pointer;
        }
        
        .super-pool-title span {
            display: inline-block;
        }

        .input-group {
            margin-bottom: 2px;
            padding: 2px;
            background: transparent;
            border-radius: 8px;
        }

        .input-group .foldable-header {
            background-color: var(--lcars-color, #ffaa00);
            color: #000 !important;
            text-shadow: none !important;
            padding: 4px 15px;
            border-radius: 15px;
            display: inline-flex;
            min-width: 140px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 12px;
            border: none !important;
            justify-content: space-between;
            align-items: center;
        }
        .tabs-header {
            display: flex;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 20px;
        }
        .tab {
            padding: 10px 20px;
            cursor: pointer;
            font-weight: bold;
            letter-spacing: 2px;
            color: rgba(255, 255, 255, 0.5);
            transition: 0.3s;
        }
        .tab.active {
            color: var(--cyan);
            border-bottom: 2px solid var(--cyan);
            text-shadow: var(--glow-cyan);
        }
        .tab:hover:not(.active) {
            color: #fff;
        }
        .tab-content {
            display: none;
        }
        .add-swimmer-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid currentColor;
            color: inherit;
            border-radius: 4px;
            padding: 2px 8px;
            font-size: 10px;
            cursor: pointer;
            margin-left: 10px;
            transition: 0.2s;
        }
        .foldable-header {
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            user-select: none;
        }
        .fold-icon {
            font-size: 10px;
            opacity: 0.7;
            transition: transform 0.2s;
        }
        .add-swimmer-btn:hover {
            background: currentColor;
            color: #000;
        }
        .tab-content.active {
            display: flex;
            flex-direction: column;
            min-height: 100%; /* fill the panel so the LCARS spine reaches the bottom */
        }

        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
                grid-template-rows: auto 1fr;
            }
            .sidebar-sash {
                display: none;
            }
            .panel {
                max-height: 40vh;
            }
            .input-grid-video, .input-grid-audio {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
