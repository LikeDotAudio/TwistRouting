
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anthony's Media Workflow Matrix</title>
    <style>
        :root {
            --bg-color: #050a15;
            --panel-bg: rgba(10, 20, 40, 0.8);
            --cyan: #00ffff;
            --magenta: #ff00ff;
            --blue: #4d94ff;
            --text-main: #e0f0ff;
            --glow-cyan: 0 0 10px var(--cyan), 0 0 20px rgba(0, 255, 255, 0.4);
            --glow-magenta: 0 0 10px var(--magenta), 0 0 20px rgba(255, 0, 255, 0.4);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Courier New', Courier, monospace;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background-image: radial-gradient(circle at 50% 50%, #1a2a4c 0%, #050a15 80%);
        }

        header {
            padding: 20px;
            text-align: center;
            border-bottom: 2px solid var(--cyan);
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.2);
            background: linear-gradient(90deg, rgba(0,255,255,0) 0%, rgba(0,255,255,0.1) 50%, rgba(0,255,255,0) 100%);
        }

        header h1 {
            font-size: 24px;
            letter-spacing: 4px;
            text-transform: uppercase;
            text-shadow: var(--glow-cyan);
        }

        .container {
            display: grid;
            grid-template-columns: 250px 1fr;
            gap: 20px;
            flex: 1;
            padding: 20px;
            min-height: 0;
        }

        .panel {
            flex: 1;
            background-color: var(--panel-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 20px;
            overflow-y: auto;
            overflow-x: hidden; /* Prevent horizontal scrollbars */
        }

        .panel-title {
            color: var(--cyan);
            font-size: 14px;
            margin-bottom: 15px;
            border-bottom: 1px solid rgba(0, 255, 255, 0.3);
            padding-bottom: 5px;
            letter-spacing: 2px;
        }

        /* Input Styles */
        .input-group {
            margin-bottom: 0;
        }

        .input-grid-video {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        .input-grid-audio {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 5px;
        }

        .signal-node {
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid var(--blue);
            border-radius: 4px;
            padding: 8px 5px;
            text-align: center;
            font-size: 10px;
            color: var(--text-main);
            position: relative;
            overflow: hidden;
            cursor: grab;
        }

        .signal-node:active {
            cursor: grabbing;
        }

        .signal-node::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 50%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            animation: scanline 3s infinite linear;
        }

        .multiplex-children {
            display: flex;
            flex-direction: column;
            gap: 5px;
            margin-top: 5px;
            padding-top: 5px;
            border-top: 1px dashed rgba(255,255,255,0.2);
        }
        .multiplex-header {
            pointer-events: none;
        }

        .signal-node.video {
            border-color: var(--magenta);
            color: var(--magenta);
            box-shadow: 0 0 5px rgba(255, 0, 255, 0.3);
        }
        .signal-node.audio {
            border-color: var(--cyan);
            color: var(--cyan);
            box-shadow: 0 0 5px rgba(0, 255, 255, 0.2);
            font-size: 9px;
            padding: 5px 2px;
        }
        
        .signal-node.video-main { border-color: #ff00ff; color: #ff00ff; box-shadow: 0 0 5px rgba(255,0,255,0.3); }
        .signal-node.video-aux { border-color: #ffaa00; color: #ffaa00; box-shadow: 0 0 5px rgba(255,170,0,0.3); }
        .signal-node.video-remote { border-color: #ff3366; color: #ff3366; box-shadow: 0 0 5px rgba(255,51,102,0.3); }
        
        .signal-node.audio-studio { border-color: #00ffff; color: #00ffff; box-shadow: 0 0 5px rgba(0,255,255,0.3); }
        .signal-node.audio-external { border-color: #aaff00; color: #aaff00; box-shadow: 0 0 5px rgba(170,255,0,0.3); }
        .signal-node.audio-comms { border-color: #aa00ff; color: #aa00ff; box-shadow: 0 0 5px rgba(170,0,255,0.3); }

        /* Pipeline / Twists Styles */
        .pipeline {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 30px;
            height: 100%;
            position: relative;
        }

        .twist-container {
            width: 45%;
            min-height: 200px;
            padding: 30px 10px 10px 55px; /* Leave room for LCARS borders */
            background: transparent;
            border: none;
            border-radius: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            position: relative;
            transition: all 0.3s ease;
        }

        .twist-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100px;
            height: 100%;
            border-left: 45px solid var(--lcars-color, #ffaa00);
            border-top: 20px solid var(--lcars-color, #ffaa00);
            border-top-left-radius: 25px;
            border-bottom-left-radius: 25px;
            box-sizing: border-box;
            z-index: 0;
        }

        .twist-container::after {
            content: '';
            position: absolute;
            top: 0;
            left: 110px;
            right: 0;
            height: 20px;
            background-color: var(--lcars-color, #ffaa00);
            border-top-right-radius: 10px;
            border-bottom-right-radius: 10px;
            z-index: 0;
        }

        .twist-container:hover {
            opacity: 0.9;
        }

        .twist-title {
            position: absolute;
            top: 3px;
            right: 15px;
            font-size: 13px;
            font-weight: bold;
            color: #000 !important;
            letter-spacing: 2px;
            text-transform: uppercase;
            z-index: 2;
        }

        /* SVG Helix Animation */
        svg {
            width: 100%;
            height: 100px;
        }

        .strand {
            fill: none;
            stroke-width: 3;
            stroke-linecap: round;
        }

        .strand-1 {
            stroke: var(--cyan);
            stroke-dasharray: 10 5;
            animation: flow 20s linear infinite;
        }

        .strand-2 {
            stroke: var(--magenta);
            stroke-dasharray: 10 5;
            animation: flow 20s linear infinite reverse;
        }

        .connector-line {
            stroke: rgba(255, 255, 255, 0.2);
            stroke-width: 1;
        }

        @keyframes scanline {
            0% { left: -100%; }
            100% { left: 200%; }
        }

        @keyframes flow {
            to { stroke-dashoffset: -1000; }
        }

        /* Arrows connecting twists */
        .arrow {
            color: rgba(0, 255, 255, 0.5);
            font-size: 24px;
            position: absolute;
        }

        /* Modal Styles */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 10, 0.85);
            backdrop-filter: blur(8px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: var(--panel-bg);
            border: none;
            border-radius: 0;
            width: 80%;
            max-width: 800px;
            min-height: 500px;
            max-height: 80vh;
            padding: 50px 20px 20px 90px;
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }

        .modal-content::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 150px;
            height: 100%;
            border-left: 70px solid var(--lcars-color, #ffaa00);
            border-top: 30px solid var(--lcars-color, #ffaa00);
            border-top-left-radius: 50px;
            border-bottom-left-radius: 50px;
            box-sizing: border-box;
            z-index: 0;
        }

        .modal-content::after {
            content: '';
            position: absolute;
            top: 0;
            left: 160px;
            right: 0;
            height: 30px;
            background-color: var(--lcars-color, #ffaa00);
            border-top-right-radius: 15px;
            border-bottom-right-radius: 15px;
            z-index: 0;
        }

        .modal-close {
            position: absolute;
            top: 0; 
            right: 15px;
            color: #000;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            z-index: 3;
            line-height: 30px;
        }

        .modal-close:hover {
            text-shadow: var(--glow-magenta);
            transform: scale(1.1);
        }

        .modal-title {
            position: absolute;
            top: 7px;
            right: 50px; /* Leave space for the close button */
            margin: 0;
            font-size: 16px;
            font-weight: bold;
            color: #000 !important;
            letter-spacing: 3px;
            z-index: 2;
            text-shadow: none;
        }

        .matrix-container {
            flex: 1;
            overflow-y: auto;
            background: rgba(0, 0, 0, 0.5);
            border: 1px inset rgba(0, 255, 255, 0.2);
            border-radius: 8px;
            padding: 20px;
        }

        .matrix-row {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
            background: rgba(0, 20, 40, 0.6);
            border: 1px solid rgba(0, 255, 255, 0.2);
            border-radius: 6px;
            padding: 10px;
            cursor: grab;
            transition: all 0.2s ease;
        }

        .matrix-row.dragging {
            opacity: 0.4;
            background: rgba(0, 255, 255, 0.1);
            border-color: var(--cyan);
        }

        .switcher-input {
            width: 120px;
            color: var(--magenta);
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 2px;
            text-shadow: var(--glow-magenta);
            text-align: right;
        }

        .twist-svg {
            flex: 1;
            height: 30px;
            margin: 0 20px;
        }

        .swimmer-slot {
            width: 100px;
            display: flex;
            justify-content: center;
        }
        .signal-node.selected {
            box-shadow: 0 0 10px #fff, inset 0 0 10px rgba(255, 255, 255, 0.5);
            border-color: #fff;
            transform: scale(1.05);
            z-index: 10;
        }

        .remove-btn {
            color: rgba(255, 255, 255, 0.3);
            font-size: 20px;
            cursor: pointer;
            margin-left: 15px;
            transition: 0.2s;
        }
        .remove-btn:hover {
            color: #ff3333;
            text-shadow: 0 0 10px #ff3333;
        }
        
        .switcher-input.audio-input {
            color: var(--cyan);
            text-shadow: var(--glow-cyan);
        }
        .switcher-input.video-input {
            color: var(--magenta);
            text-shadow: var(--glow-magenta);
        }
        .signal-node.video-main { border-color: #FF9C00; box-shadow: 0 0 5px rgba(255,156,0,0.3); color: #FF9C00; }
        .signal-node.video-aux { border-color: #FFCC99; box-shadow: 0 0 5px rgba(255,204,153,0.3); color: #FFCC99; }
        .signal-node.video-remote { border-color: #CC99CC; box-shadow: 0 0 5px rgba(204,153,204,0.3); color: #CC99CC; }
        .signal-node.video-st1 { border-color: #FF9C00; box-shadow: 0 0 5px rgba(255,156,0,0.3); color: #FF9C00; }
        .signal-node.video-st2 { border-color: #FFCC99; box-shadow: 0 0 5px rgba(255,204,153,0.3); color: #FFCC99; }
        .signal-node.video-st3 { border-color: #FFFF33; box-shadow: 0 0 5px rgba(255,255,51,0.3); color: #FFFF33; }
        .signal-node.video-st4 { border-color: #CC99CC; box-shadow: 0 0 5px rgba(204,153,204,0.3); color: #CC99CC; }
        .signal-node.audio-studio { border-color: #99CCFF; box-shadow: 0 0 5px rgba(153,204,255,0.3); color: #99CCFF; }
        .signal-node.audio-external { border-color: #3399FF; box-shadow: 0 0 5px rgba(51,153,255,0.3); color: #3399FF; }
        .signal-node.audio-comms { border-color: #FFFF33; box-shadow: 0 0 5px rgba(255,255,51,0.3); color: #FFFF33; }
        
        .super-pool-container {
            position: relative;
            background: transparent;
            border: none;
            border-radius: 0;
            padding: 27px 2px 2px 62px; /* Very tight padding: 2px gap from 60px spine */
            margin-bottom: 25px;
            box-shadow: none;
            cursor: pointer; /* Suggests the spine is clickable */
        }
        
        .super-pool-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 130px;
            height: 100%;
            border-left: 60px solid var(--lcars-color, #ffaa00);
            border-top: 25px solid var(--lcars-color, #ffaa00);
            border-top-left-radius: 40px;
            border-bottom-left-radius: 40px;
            box-sizing: border-box;
            z-index: 0;
        }

        .super-pool-container::after {
            content: '';
            position: absolute;
            top: 0;
            left: 140px;
            right: 0;
            height: 25px;
            background-color: var(--lcars-color, #ffaa00);
            border-top-right-radius: 12px;
            border-bottom-right-radius: 12px;
            z-index: 0;
        }

        .super-pool-content {
            position: relative;
            z-index: 1;
            cursor: default; /* Reset cursor for content inside */
        }

        .video-super-pool {
            --lcars-color: #FF9C00; /* LCARS Orange */
        }
        .audio-super-pool {
            --lcars-color: #99CCFF; /* LCARS Light Blue */
        }
        
        .super-pool-title {
            position: absolute;
            top: 6px;
            right: 15px;
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 3px;
            color: #000;
            z-index: 2;
            cursor: pointer;
        }
        
        .super-pool-title span {
            display: inline-block;
        }

        .input-group {
            margin-bottom: 2px;
            padding: 2px;
            background: transparent;
            border-radius: 8px;
        }

        .input-group .foldable-header {
            background-color: var(--lcars-color, #ffaa00);
            color: #000 !important;
            text-shadow: none !important;
            padding: 4px 15px;
            border-radius: 15px;
            display: inline-flex;
            min-width: 140px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 12px;
            border: none !important;
            justify-content: space-between;
            align-items: center;
        }
        .tabs-header {
            display: flex;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 20px;
        }
        .tab {
            padding: 10px 20px;
            cursor: pointer;
            font-weight: bold;
            letter-spacing: 2px;
            color: rgba(255, 255, 255, 0.5);
            transition: 0.3s;
        }
        .tab.active {
            color: var(--cyan);
            border-bottom: 2px solid var(--cyan);
            text-shadow: var(--glow-cyan);
        }
        .tab:hover:not(.active) {
            color: #fff;
        }
        .tab-content {
            display: none;
            height: calc(100% - 60px);
            overflow-y: auto;
        }
        .add-swimmer-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid currentColor;
            color: inherit;
            border-radius: 4px;
            padding: 2px 8px;
            font-size: 10px;
            cursor: pointer;
            margin-left: 10px;
            transition: 0.2s;
        }
        .foldable-header {
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            user-select: none;
        }
        .fold-icon {
            font-size: 10px;
            opacity: 0.7;
            transition: transform 0.2s;
        }
        .add-swimmer-btn:hover {
            background: currentColor;
            color: #000;
        }
        .tab-content.active {
            display: block;
        }

        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
                grid-template-rows: auto 1fr;
            }
            .panel {
                max-height: 40vh;
            }
            .input-grid-video, .input-grid-audio {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>SYSTEM OS :: ANTHONY // Matrix Core</h1>
    </header>

    <div class="container">
        <div class="panel ingress-panel">
            <div class="super-pool-container productions-super-pool" onclick="toggleSuperPool(event, this)">
                <div class="super-pool-title foldable-header" style="color: #7CFC00; border-bottom-color: #7CFC00;">
                    <span>PRODUCTIONS</span><span class="fold-icon">▼</span>
                </div>
                <div class="super-pool-content" id="productions-super-pool-content">
                </div>
            </div>

            <div class="super-pool-container video-super-pool" onclick="toggleSuperPool(event, this)">
                <div class="super-pool-title foldable-header" style="color: var(--magenta); border-bottom-color: var(--magenta);">
                    <span>VIDEO POOLS</span><span class="fold-icon">▼</span>
                </div>
                <div class="super-pool-content" id="video-super-pool-content">
                </div>
            </div>

            <div class="super-pool-container audio-super-pool" onclick="toggleSuperPool(event, this)">
                <div class="super-pool-title foldable-header" style="color: var(--cyan); border-bottom-color: var(--cyan);">
                    <span>AUDIO POOLS</span><span class="fold-icon">▼</span>
                </div>
                <div class="super-pool-content" id="audio-super-pool-content">
                </div>
            </div>
        </div>

        <div class="panel" style="overflow: hidden;">
            <div id="production-tabs" class="tabs-header">
                <!-- Tabs injected here -->
            </div>
            <div id="production-content" style="height: calc(100% - 60px);">
                <!-- Tab contents injected here -->
            </div>
        </div>
    </div>

    <div id="twist-modal" class="modal-overlay">
        <div class="modal-content">
            <span class="modal-close" onclick="closeTwistModal()">&times;</span>
            <h2 id="modal-title" class="modal-title">TWIST DETAILS</h2>
            <div id="matrix-container" class="matrix-container">
                <!-- Matrix rows injected here -->
            </div>
            <div style="margin-top: 15px; text-align: center; color: rgba(255,255,255,0.5); font-size: 12px; letter-spacing: 1px;">
                DRAG ROWS TO REORDER PRIORITY AND SWITCHER INPUT ASSIGNMENTS
            </div>
        </div>
    </div>

    <script src="js/globals.js?v=6"></script>
    <script src="js/poolVideo.js?v=5"></script>
    <script src="js/poolAudio.js?v=5"></script>
    <script src="js/visuals.js?v=5"></script>
    <script src="js/matrix.js?v=5"></script>
    <script src="js/dragDrop.js?v=5"></script>
    <script src="js/productions.js?v=5"></script>
    <script src="js/app.js?v=5"></script>
</body>
</html>
